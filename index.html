<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a7a4a">

<title>شاركنا بفكرتك</title>

<link rel="manifest" href="./manifest.json">

<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

:root {
    --green:#1a7a4a;
    --gl:#27ae60;
    --bg:#e8f5ee;
    --border:#c8e6d4;
}

body {
    font-family:'Cairo',sans-serif;
    background:linear-gradient(135deg,#e8f5ee,#d4edde);
}

/* HEADER */
.header {
    text-align:center;
    padding:20px;
    background:linear-gradient(135deg,#1a7a4a,#145e38);
    color:white;
}

.logo-img {
    width:110px;
    height:110px;
    border-radius:20px;
    background:white;
    padding:5px;
}

.header h1 { font-weight:900; margin-top:10px; }
.header p { margin-top:5px; font-weight:700; }

/* TABS */
.tabs { display:flex; background:white; }
.tab-btn { flex:1; padding:12px; border:none; background:none; font-weight:700; cursor:pointer; }
.tab-btn.active { color:var(--green); border-bottom:3px solid var(--green); }

/* SCREENS */
.screen { display:none; padding:15px; }
.screen.active { display:block; }

/* FORM */
.form-card, .idea-card {
    background:white;
    padding:15px;
    border-radius:12px;
    margin-bottom:12px;
}

input, textarea {
    width:100%;
    padding:10px;
    border:2px solid var(--border);
    border-radius:10px;
    margin-bottom:10px;
}

.submit-btn {
    width:100%;
    padding:12px;
    background:linear-gradient(135deg,#1a7a4a,#27ae60);
    color:white;
    border:none;
    border-radius:10px;
    font-weight:900;
}

/* IDEA */
.idea-meta {
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.idea-name { font-weight:900; color:#1a7a4a; }

.idea-actions {
    display:flex;
    align-items:center;
    gap:6px;
}

.idea-check input {
    width:18px;
    height:18px;
}

/* buttons small */
.small-btn {
    width:28px;
    height:28px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.edit { background:#ffc107; }
.delete { background:#dc3545; color:white; }

/* PWA */
.pwa-overlay {
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    justify-content:center;
    align-items:center;
}

.pwa-overlay.show { display:flex; }

.pwa-box {
    background:white;
    padding:20px;
    border-radius:15px;
    text-align:center;
}
</style>
</head>

<body>

<!-- PWA -->
<div class="pwa-overlay" id="pwa-overlay">
    <div class="pwa-box">
        <p>📲 ثبت التطبيق للوصول السريع</p>
        <button class="submit-btn" id="install-btn">تثبيت</button>
    </div>
</div>

<!-- HEADER -->
<div class="header">
    <img src="logo.png" class="logo-img">
    <h1>شاركنا بفكرتك</h1>
    <p>"الإخلاء": معًا لغدٍ أفضل</p>
</div>

<!-- TABS -->
<div class="tabs">
    <button class="tab-btn active" onclick="showScreen('form')">💡 فكرة</button>
    <button class="tab-btn" onclick="showScreen('ideas')">📋 الأفكار</button>
</div>

<!-- FORM -->
<div class="screen active" id="screen-form">
    <div class="form-card">
        <input id="inp-name" placeholder="اسمك">
        <textarea id="inp-idea" placeholder="الفكرة"></textarea>
        <textarea id="inp-impl" placeholder="التنفيذ"></textarea>
        <button class="submit-btn" onclick="submitIdea()">إرسال</button>
    </div>
</div>

<!-- IDEAS -->
<div class="screen" id="screen-ideas">
    <div id="ideas-list"></div>
</div>

<script>
const scriptURL = "PUT_YOUR_SCRIPT_URL_HERE";

/* PWA */
let deferredPrompt;
const overlay = document.getElementById("pwa-overlay");

window.addEventListener("beforeinstallprompt", (e) => {
    e.preventDefault();
    deferredPrompt = e;

    if (!localStorage.getItem("pwaShown")) {
        overlay.classList.add("show");
        localStorage.setItem("pwaShown", "true");
    }
});

document.getElementById("install-btn").onclick = async () => {
    overlay.classList.remove("show");
    if (deferredPrompt) {
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
    }
};

/* SUBMIT */
async function submitIdea() {
    const name = document.getElementById("inp-name").value;
    const idea = document.getElementById("inp-idea").value;
    const impl = document.getElementById("inp-impl").value;

    if (!name || !idea || !impl) {
        alert("كمل البيانات");
        return;
    }

    const f = new URLSearchParams();
    f.append("action", "add");
    f.append("الاسم", name);
    f.append("الفكرة", idea);
    f.append("التنفيذ", impl);

    await fetch(scriptURL, { method: "POST", body: f });

    document.getElementById("inp-name").value = "";
    document.getElementById("inp-idea").value = "";
    document.getElementById("inp-impl").value = "";

    loadIdeas();
}

/* LOAD */
async function loadIdeas() {
    const r = await fetch(scriptURL + "?t=" + Date.now());
    const data = await r.json();

    const container = document.getElementById("ideas-list");

    if (!data.length) {
        container.innerHTML = "<p>لا توجد أفكار بعد</p>";
        return;
    }

    container.innerHTML = data.map(i => `
    <div class="idea-card">
        <div class="idea-meta">

            <div class="idea-name">👤 ${i.الاسم}</div>

            <div class="idea-actions">

                <input type="checkbox" ${i.التنفيذ === 'اتنفذت' ? 'checked' : ''}>

                <button class="small-btn edit"
                onclick="editIdea(${i.id}, \`${i.الفكرة}\`)">✏️</button>

                <button class="small-btn delete"
                onclick="deleteIdea(${i.id})">🗑️</button>

            </div>

        </div>

        <p>💡 ${i.الفكرة}</p>
        <p>🛠️ ${i.التنفيذ}</p>
    </div>
    `).join("");
}

/* DELETE */
async function deleteIdea(id) {
    if (!confirm("حذف؟")) return;

    const f = new URLSearchParams();
    f.append("action", "delete");
    f.append("id", id);

    await fetch(scriptURL, { method: "POST", body: f });
    loadIdeas();
}

/* EDIT */
async function editIdea(id, oldIdea) {
    const n = prompt("عدل:", oldIdea);
    if (!n) return;

    const f = new URLSearchParams();
    f.append("action", "edit");
    f.append("id", id);
    f.append("الفكرة", n);

    await fetch(scriptURL, { method: "POST", body: f });
    loadIdeas();
}

/* TABS */
function showScreen(s) {
    document.querySelectorAll(".screen").forEach(e => e.classList.remove("active"));
    document.getElementById("screen-" + s).classList.add("active");

    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    event.currentTarget.classList.add("active");

    if (s === "ideas") loadIdeas();
}

/* SW */
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js");
}

loadIdeas();
</script>

</body>
</html>
