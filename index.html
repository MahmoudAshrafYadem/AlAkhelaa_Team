<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a7a4a">
<title>الإخلاء - شاركنا بفكرتك</title>
<link rel="manifest" href="./manifest.json">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root {
    --green:#1a7a4a; --gl:#27ae60; --gbg:#e8f5ee;
    --text:#2d4a38; --gray:#6b8a76; --white:#fff; --border:#c8e6d4;
  }
  body { font-family:'Cairo',sans-serif; background:linear-gradient(135deg,#e8f5ee,#d4edde,#c8e6d4); min-height:100vh; color:var(--text); }

  /* HEADER */
  .header { background:linear-gradient(135deg,var(--green),#145e38); padding:40px 20px; text-align:center; color:white; }
  .logo-img { width:110px; height:110px; border-radius:50%; background:var(--white); margin:0 auto 15px; display:block; border:4px solid var(--white); box-shadow:0 4px 15px rgba(0,0,0,0.2); object-fit: cover; }
  .header h1 { font-size:22px; font-weight:900; margin-bottom: 5px; }
  .header p { font-size:16px; font-weight:600; opacity: 0.9; }

  /* TABS */
  .tabs { display:flex; background:var(--white); border-bottom:2px solid var(--border); position:sticky; top:0; z-index:100; }
  .tab-btn { flex:1; padding:15px; border:none; background:transparent; font-family:'Cairo',sans-serif; font-size:15px; font-weight:700; color:var(--gray); cursor:pointer; }
  .tab-btn.active { color:var(--green); border-bottom:3px solid var(--green); background:var(--gbg); }

  /* SCREENS */
  .screen { display:none; padding:20px 15px 100px; }
  .screen.active { display:block; }

  /* CARDS */
  .form-card, .idea-card { background:var(--white); border-radius:18px; padding:20px; box-shadow:0 2px 12px rgba(26,122,74,.1); margin-bottom:15px; }
  .fl { font-size:14px; font-weight:700; margin-bottom:7px; display:block; }
  input, textarea { width:100%; padding:12px; border:2px solid var(--border); border-radius:12px; font-family:'Cairo',sans-serif; margin-bottom:15px; outline:none; }
  
  .submit-btn { width:100%; padding:15px; background:linear-gradient(135deg,var(--green),var(--gl)); color:white; border:none; border-radius:12px; font-weight:900; font-size:17px; cursor:pointer; }

  /* IDEA CARD */
  .idea-card { border-right:5px solid var(--green); position: relative; }
  .idea-name { font-weight:900; color:var(--green); margin-bottom: 10px; display: block; }
  
  /* CHECKBOX STYLE */
  .check-container { display: flex; align-items: center; gap: 8px; background: var(--gbg); padding: 5px 12px; border-radius: 20px; width: fit-content; margin-top: 10px; cursor: pointer; }
  .check-container input { width: 18px; height: 18px; margin: 0; cursor: pointer; accent-color: var(--green); }
  .check-text { font-size: 13px; font-weight: 700; color: var(--green); }

  /* PWA POPUP */
  .pwa-popup { display:none; position:fixed; bottom:20px; left:20px; right:20px; background:var(--white); padding:20px; border-radius:20px; box-shadow:0 -5px 25px rgba(0,0,0,0.2); z-index:2000; text-align:center; border: 2px solid var(--green); }
  .pwa-popup.show { display:block; animation: slideUp 0.5s ease; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
</style>
</head>
<body>

<div class="pwa-popup" id="pwa-popup">
  <p style="margin-bottom:15px; font-weight:700;">ضيف التطبيق لشاشتك الرئيسية عشان توصله بسهولة! 📲</p>
  <button class="submit-btn" id="btn-install">تثبيت الآن</button>
</div>

<div class="header">
  <img src="WhatsApp Image 2026-03-25 at 3.29.24 AM.jpeg" class="logo-img" alt="لوجو">
  <h1>شاركنا بفكرتك</h1>
  <p>الأخلاء: معًا لغدٍ أفضل</p>
</div>

<div class="tabs">
  <button class="tab-btn active" id="tab-form" onclick="showScreen('form')">💡 فكرة جديدة</button>
  <button class="tab-btn" id="tab-ideas" onclick="showScreen('ideas')">📋 الأفكار</button>
</div>

<div class="screen active" id="screen-form">
  <div class="form-card">
    <label class="fl">👤 اسمك</label>
    <input type="text" id="inp-name" placeholder="اكتب اسمك هنا...">
    <label class="fl">💡 الفكرة</label>
    <textarea id="inp-idea" rows="3" placeholder="إيه الفكرة اللي في دماغك؟"></textarea>
    <label class="fl">🛠️ مقترح التنفيذ</label>
    <textarea id="inp-impl" rows="3" placeholder="إزاي نقدر ننفذها؟"></textarea>
    <button class="submit-btn" onclick="submitIdea()">✅ ابعت فكرتك</button>
  </div>
</div>

<div class="screen" id="screen-ideas">
  <div id="ideas-list"><p style="text-align:center; color:var(--gray)">جاري تحميل الأفكار...</p></div>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbx9XVWoWg5FKj9yrdWdNQ-bPopBRNQdq268UnKxXsGnLDinmOI93w5jhRyOiukH01lkNw/exec";

// --- 1. PWA INSTALL LOGIC (Pop up) ---
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('pwa-popup').classList.add('show');
});

document.getElementById('btn-install').addEventListener('click', async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') document.getElementById('pwa-popup').classList.remove('show');
    deferredPrompt = null;
  }
});

// --- 2. SUBMIT IDEA ---
async function submitIdea() {
  const name = document.getElementById('inp-name').value;
  const idea = document.getElementById('inp-idea').value;
  const impl = document.getElementById('inp-impl').value;
  if(!name || !idea || !impl) return alert("من فضلك كمل البيانات");

  const formData = new URLSearchParams();
  formData.append('action', 'add');
  formData.append('الاسم', name);
  formData.append('الفكرة', idea);
  formData.append('التنفيذ', impl);

  try {
    await fetch(scriptURL, { method: 'POST', body: formData, mode: 'no-cors' });
    alert("شكراً! فكرتك وصلت ❤️");
    location.reload(); 
  } catch(e) { alert("خطأ في الإرسال"); }
}

// --- 3. LOAD IDEAS (Older to Newer) ---
async function loadIdeas() {
  const list = document.getElementById('ideas-list');
  try {
    const r = await fetch(scriptURL + "?nocache=" + Date.now());
    const data = await r.json();
    
    // الترتيب من الأقدم للأحدث (حسب ترتيب وصولها للشيت)
    list.innerHTML = data.map(i => `
      <div class="idea-card">
        <span class="idea-name">👤 ${i.الاسم}</span>
        <p><strong>💡 الفكرة:</strong> ${i.الفكرة}</p>
        <p style="margin-top:5px"><strong>🛠️ التنفيذ:</strong> ${i.التنفيذ}</p>
        
        <label class="check-container">
            <input type="checkbox" id="check-${i.id}" onchange="saveCheck(${i.id}, this.checked)">
            <span class="check-text">اتنفذت؟</span>
        </label>
      </div>
    `).join('');
  } catch(e) { list.innerHTML = "فشل في تحميل الأفكار."; }
}

// دالة لحفظ حالة الـ Checkbox محلياً (كدا بيبقى تفاعلي)
function saveCheck(id, status) {
    localStorage.setItem('task-' + id, status);
}

function showScreen(n) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-'+n).classList.add('active');
  document.getElementById('tab-'+n).classList.add('active');
  if(n === 'ideas') loadIdeas();
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
</script>
</body>
</html>
